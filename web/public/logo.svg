<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="75" fill="white" opacity="0.15"/>
  
  <!-- H Letter / Person Icon -->
  <g fill="white">
    <!-- Head -->
    <circle cx="100" cy="65" r="18"/>
    
    <!-- Body / H shape -->
    <rect x="75" y="90" width="12" height="50" rx="3"/>
    <rect x="113" y="90" width="12" height="50" rx="3"/>
    <rect x="87" y="105" width="26" height="12" rx="2"/>
    
    <!-- Tie/Collar -->
    <polygon points="100,95 95,115 100,110 105,115" fill="#FBBF24"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="40" cy="100" r="4" fill="#FBBF24" opacity="0.8"/>
  <circle cx="160" cy="100" r="4" fill="#FBBF24" opacity="0.8"/>
  <circle cx="100" cy="35" r="3" fill="#60A5FA" opacity="0.6"/>
  <circle cx="100" cy="165" r="3" fill="#60A5FA" opacity="0.6"/>
</svg>
